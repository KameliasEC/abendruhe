<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Abendruhe – Schlafmeditation</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0e1f">

    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Abendruhe">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,300&display=swap" rel="stylesheet">

    <!-- Supabase JS Library (für Multi-User Datenbank) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --bg-deep:    #0a0e1f;
            --bg-mid:     #1a1c3a;
            --bg-glow:    #2a2547;
            --accent:     #d4a574;
            --accent-soft:#e8c896;
            --text:       #e8dcc4;
            --text-dim:   #8a8299;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Fraunces', serif;
            background: var(--bg-deep);
            color: var(--text);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 2rem 1.5rem;
            padding-top: max(2rem, env(safe-area-inset-top));
            padding-bottom: max(2rem, env(safe-area-inset-bottom));
            overflow: hidden;
            position: relative;
            -webkit-tap-highlight-color: transparent;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 20% 0%, var(--bg-mid) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 100%, var(--bg-glow) 0%, transparent 60%);
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                radial-gradient(1px 1px at 20% 30%, var(--text), transparent),
                radial-gradient(1px 1px at 60% 70%, var(--accent), transparent),
                radial-gradient(1px 1px at 80% 20%, var(--text), transparent),
                radial-gradient(1px 1px at 30% 85%, var(--accent-soft), transparent),
                radial-gradient(1px 1px at 50% 50%, var(--text), transparent);
            opacity: 0.4;
            z-index: 0;
        }

        header, main, footer {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 480px;
            text-align: center;
        }

        header h1 {
            font-weight: 300;
            font-size: clamp(1.75rem, 5vw, 2.5rem);
            font-style: italic;
            letter-spacing: 0.02em;
        }
        header p {
            font-size: 0.75rem;
            color: var(--text-dim);
            letter-spacing: 0.25em;
            text-transform: uppercase;
            margin-top: 0.5rem;
        }

        main {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            gap: 2.5rem;
        }

        .breath-container {
            width: min(280px, 70vw);
            height: min(280px, 70vw);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .breath-circle {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, var(--accent-soft) 0%, var(--accent) 50%, transparent 100%);
            animation: breathe 8s ease-in-out infinite;
        }
        .breath-circle.outer { width: 100%; height: 100%; opacity: 0.10; }
        .breath-circle.inner { width: 60%;  height: 60%;  opacity: 0.30; }

        @keyframes breathe {
            0%, 100% { transform: scale(0.85); }
            50%      { transform: scale(1.15); }
        }

        body.paused .breath-circle { animation-play-state: paused; }

        .breath-text {
            position: relative;
            z-index: 2;
            font-style: italic;
            font-weight: 300;
            font-size: 1.25rem;
            opacity: 0;
            transition: opacity 1s ease;
        }
        body.active .breath-text { opacity: 1; }

        .timer {
            font-size: 3rem;
            font-weight: 300;
            font-feature-settings: 'tnum';
            letter-spacing: 0.05em;
        }
        .timer-label {
            font-size: 0.7rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-top: 0.5rem;
        }

        .controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
            width: 100%;
        }

        .start-btn {
            background: transparent;
            color: var(--text);
            border: 1px solid var(--accent);
            font-family: inherit;
            font-size: 1rem;
            font-style: italic;
            padding: 1rem 3rem;
            border-radius: 999px;
            cursor: pointer;
            transition: all 0.4s ease;
            letter-spacing: 0.05em;
            min-width: 180px;
        }
        .start-btn:hover {
            background: var(--accent);
            color: var(--bg-deep);
            box-shadow: 0 0 40px rgba(212, 165, 116, 0.3);
        }
        .start-btn:disabled {
            opacity: 0.4;
            cursor: wait;
        }

        footer {
            font-size: 0.7rem;
            color: var(--text-dim);
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        /* Erinnerungs-Sektion */
        .reminder {
            width: 100%;
            margin-top: 1.5rem;
            padding: 1.25rem 1.5rem;
            border: 1px solid rgba(232, 220, 196, 0.08);
            border-radius: 1rem;
            background: rgba(255, 255, 255, 0.02);
        }
        .reminder h2 {
            font-size: 0.7rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--text-dim);
            font-weight: 400;
            margin-bottom: 0.5rem;
        }
        .reminder-status {
            font-size: 0.95rem;
            color: var(--text);
            margin-bottom: 1rem;
            font-style: italic;
            font-weight: 300;
        }
        .reminder-btn {
            background: transparent;
            color: var(--text);
            border: 1px solid rgba(232, 220, 196, 0.25);
            font-family: inherit;
            font-size: 0.875rem;
            padding: 0.5rem 1.5rem;
            border-radius: 999px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .reminder-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }
        .subscription-output {
            margin-top: 1.25rem;
            text-align: left;
        }
        .subscription-output > p {
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-bottom: 0.5rem;
            line-height: 1.5;
        }
        .subscription-output textarea {
            width: 100%;
            height: 110px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(232, 220, 196, 0.1);
            border-radius: 0.5rem;
            color: var(--text);
            font-family: ui-monospace, monospace;
            font-size: 0.7rem;
            padding: 0.75rem;
            resize: none;
            line-height: 1.4;
        }
        .copy-btn {
            margin-top: 0.5rem;
            background: transparent;
            color: var(--text-dim);
            border: none;
            font-family: inherit;
            font-size: 0.8rem;
            cursor: pointer;
            padding: 0.25rem 0;
            font-style: italic;
        }
        .copy-btn:hover { color: var(--accent); }

        /* Zeit-Picker für die Erinnerung */
        .time-picker-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            margin: 1rem 0;
            font-size: 0.95rem;
            color: var(--text);
            font-style: italic;
            font-weight: 300;
        }
        input[type="time"] {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(232, 220, 196, 0.2);
            border-radius: 0.5rem;
            color: var(--text);
            font-family: inherit;
            font-size: 1.05rem;
            padding: 0.4rem 0.75rem;
            font-feature-settings: 'tnum';
            color-scheme: dark;
        }
        input[type="time"]:focus {
            outline: none;
            border-color: var(--accent);
        }
        .save-feedback {
            font-size: 0.75rem;
            color: var(--accent);
            font-style: italic;
            margin-bottom: 0.75rem;
            opacity: 0;
            transition: opacity 0.3s ease;
            height: 1em;
        }
        .save-feedback.visible { opacity: 1; }
    </style>
</head>
<body>
    <header>
        <h1>Abendruhe</h1>
        <p>Schlafmeditation</p>
    </header>

    <main>
        <div class="breath-container">
            <div class="breath-circle outer"></div>
            <div class="breath-circle inner"></div>
            <div class="breath-text" id="breathText">Atme ein</div>
        </div>

        <div>
            <div class="timer" id="timer">--:--</div>
            <div class="timer-label">Verbleibend</div>
        </div>

        <div class="controls">
            <button class="start-btn" id="startBtn" disabled>Lädt…</button>
        </div>

        <section class="reminder">
            <h2>Tägliche Erinnerung</h2>
            <p class="reminder-status" id="reminderStatus">Wird geladen…</p>

            <div class="time-picker-row" id="timePickerRow" hidden>
                <label for="reminderTime">Um</label>
                <input type="time" id="reminderTime" value="22:00">
            </div>

            <p class="save-feedback" id="saveFeedback">✓ Gespeichert</p>

            <button class="reminder-btn" id="reminderBtn" hidden>Erinnerung aktivieren</button>
        </section>
    </main>

    <footer>Gute Nacht</footer>

    <!-- Audio-Element: das Meditations-Audio (im Hintergrund, nicht sichtbar) -->
    <audio id="meditationAudio" preload="auto" src="audio/meditation.m4a"></audio>

    <script>
    /* ================================================
       MEDITATIONS-PLAYBACK (mit Audio)
       ================================================ */

    const audio        = document.getElementById('meditationAudio');
    const timerEl      = document.getElementById('timer');
    const startBtn     = document.getElementById('startBtn');
    const breathTextEl = document.getElementById('breathText');

    let isRunning      = false;
    let breathInterval = null;

    function formatTime(s) {
        const m = Math.floor(s / 60);
        const r = Math.floor(s % 60);
        return String(m).padStart(2, '0') + ':' + String(r).padStart(2, '0');
    }
    function updateTimer(seconds) {
        timerEl.textContent = formatTime(seconds);
    }

    // Wenn Audio-Metadaten geladen: Länge im Timer anzeigen, Button aktivieren
    audio.addEventListener('loadedmetadata', () => {
        updateTimer(audio.duration);
        startBtn.textContent = 'Starten';
        startBtn.disabled = false;
    });

    // Timer ständig aktualisieren während Audio läuft
    audio.addEventListener('timeupdate', () => {
        if (!isFinite(audio.duration)) return;
        updateTimer(audio.duration - audio.currentTime);
    });

    // Audio zu Ende → Meditation abschließen
    audio.addEventListener('ended', () => {
        finish();
    });

    // Falls Audio nicht lädt: Fehler zeigen statt ewig "Lädt…"
    audio.addEventListener('error', () => {
        startBtn.textContent = 'Audio nicht verfügbar';
        startBtn.disabled = true;
    });

    let breathPhase = 0;
    function toggleBreathText() {
        breathPhase = (breathPhase + 1) % 2;
        breathTextEl.textContent = breathPhase === 0 ? 'Atme ein' : 'Atme aus';
    }

    function start() {
        isRunning = true;
        startBtn.textContent = 'Pause';
        document.body.classList.add('active');
        document.body.classList.remove('paused');
        audio.play().catch(err => console.log('Audio-Start fehlgeschlagen:', err));
        breathInterval = setInterval(toggleBreathText, 4000);
    }

    function pause() {
        isRunning = false;
        startBtn.textContent = 'Weiter';
        document.body.classList.add('paused');
        audio.pause();
        clearInterval(breathInterval);
    }

    function finish() {
        isRunning = false;
        audio.pause();
        audio.currentTime = 0;
        updateTimer(audio.duration);
        startBtn.textContent = 'Starten';
        document.body.classList.remove('active', 'paused');
        breathTextEl.textContent = 'Atme ein';
        breathPhase = 0;
        clearInterval(breathInterval);
        playChime();
    }

    function playChime() {
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.frequency.value = 528;
            osc.type = 'sine';
            gain.gain.setValueAtTime(0, ctx.currentTime);
            gain.gain.linearRampToValueAtTime(0.1, ctx.currentTime + 0.3);
            gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 3);
            osc.connect(gain).connect(ctx.destination);
            osc.start();
            osc.stop(ctx.currentTime + 3);
        } catch (e) {}
    }

    startBtn.addEventListener('click', () => {
        if (isRunning) pause(); else start();
    });

    /* ================================================
       MEDIA SESSION API: Lockscreen-Steuerung auf iPhone
       ================================================ */
    if ('mediaSession' in navigator) {
        navigator.mediaSession.metadata = new MediaMetadata({
            title: 'Schlafmeditation',
            artist: 'Abendruhe',
            artwork: [
                { src: 'icon-192.png', sizes: '192x192', type: 'image/png' },
                { src: 'icon-512.png', sizes: '512x512', type: 'image/png' }
            ]
        });
        navigator.mediaSession.setActionHandler('play',  () => { if (!isRunning) start(); });
        navigator.mediaSession.setActionHandler('pause', () => { if (isRunning) pause(); });
    }

    /* ================================================
       PUSH-NOTIFICATIONS: Subscription verwalten
       ================================================ */

    // VAPID Public Key (muss zum Private Key in den GitHub-Secrets passen)
    const VAPID_PUBLIC_KEY = 'BMJ8kQA_K-REFsZVlOlfluX3cF9hHoRB4f8xeCrIbQ3gnMHOxAiDwTNGwHl-a9rPyfsauyNFzhtVmOy8EBQsEDM';

    // Supabase-Konfiguration (Publishable Key ist designed um öffentlich zu sein)
    const SUPABASE_URL = 'https://cwijrgutwwctcomvnkkp.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_VLi4gVepW0HnHUrvr9elmQ_8H5_5Jwo';
    const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Hilfsfunktion: Base64-URL → Uint8Array (was die Push-API will)
    function urlBase64ToUint8Array(base64) {
        const padding = '='.repeat((4 - base64.length % 4) % 4);
        const b64 = (base64 + padding).replace(/-/g, '+').replace(/_/g, '/');
        const raw = atob(b64);
        return Uint8Array.from(raw, c => c.charCodeAt(0));
    }

    const reminderBtn    = document.getElementById('reminderBtn');
    const reminderStatus = document.getElementById('reminderStatus');
    const timePickerRow  = document.getElementById('timePickerRow');
    const reminderTime   = document.getElementById('reminderTime');
    const saveFeedback   = document.getElementById('saveFeedback');

    // Letzte gewählte Zeit aus dem Browser-Speicher holen (oder Standard 22:00)
    const savedTime = localStorage.getItem('reminderTime') || '22:00';
    reminderTime.value = savedTime;

    function showFeedback(text, isError) {
        saveFeedback.textContent = text;
        saveFeedback.style.color = isError ? '#ff8080' : 'var(--accent)';
        saveFeedback.classList.add('visible');
        clearTimeout(showFeedback.timeout);
        showFeedback.timeout = setTimeout(() => saveFeedback.classList.remove('visible'), 2500);
    }

    async function getCurrentSubscription() {
        const reg = await navigator.serviceWorker.ready;
        return await reg.pushManager.getSubscription();
    }

    function parseTime(value) {
        const [h, m] = value.split(':').map(Number);
        return { hour: h, minute: m };
    }

    async function updateReminderUI() {
        // Browser-Support checken
        if (!('serviceWorker' in navigator) || !('PushManager' in window) || !('Notification' in window)) {
            reminderStatus.textContent = 'Push wird von diesem Browser nicht unterstützt';
            return;
        }
        // iOS verlangt Installation auf Homescreen
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
        const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
        if (isIOS && !isStandalone) {
            reminderStatus.textContent = 'Auf iPhone: erst zum Home-Bildschirm hinzufügen, dann hier öffnen';
            return;
        }
        if (Notification.permission === 'denied') {
            reminderStatus.textContent = 'Notifications sind blockiert (in den Browser-Einstellungen erlauben)';
            return;
        }

        const sub = await getCurrentSubscription();
        reminderBtn.hidden = false;
        timePickerRow.hidden = false;

        if (sub) {
            reminderStatus.textContent = '✓ Aktiv um ' + reminderTime.value;
            reminderBtn.textContent = 'Deaktivieren';
        } else {
            reminderStatus.textContent = 'Noch nicht aktiv';
            reminderBtn.textContent = 'Erinnerung aktivieren';
        }
    }

    async function subscribe() {
        // 1) Notification-Erlaubnis holen
        const permission = await Notification.requestPermission();
        if (permission !== 'granted') {
            reminderStatus.textContent = 'Du musst Notifications erlauben';
            return;
        }

        // 2) Beim Push-Service subscriben
        const reg = await navigator.serviceWorker.ready;
        const pushSub = await reg.pushManager.subscribe({
            userVisibleOnly: true,
            applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
        });

        // 3) In Supabase speichern (mit Zeit + Zeitzone)
        const subData = pushSub.toJSON();
        const { hour, minute } = parseTime(reminderTime.value);
        const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;

        const { error } = await db
            .from('subscriptions')
            .upsert({
                endpoint:        subData.endpoint,
                p256dh:          subData.keys.p256dh,
                auth:            subData.keys.auth,
                reminder_hour:   hour,
                reminder_minute: minute,
                timezone:        timezone
            }, { onConflict: 'endpoint' });

        if (error) {
            console.error('Supabase Fehler:', error);
            // Rollback: Push-Subscription wieder aufheben
            await pushSub.unsubscribe();
            showFeedback('Fehler beim Speichern: ' + error.message, true);
            return;
        }

        localStorage.setItem('reminderTime', reminderTime.value);
        showFeedback('✓ Erinnerung aktiviert');
    }

    async function unsubscribe() {
        const pushSub = await getCurrentSubscription();
        if (!pushSub) return;

        // Erst aus Supabase löschen
        const { error } = await db
            .from('subscriptions')
            .delete()
            .eq('endpoint', pushSub.endpoint);

        if (error) {
            console.warn('Supabase Lösch-Fehler (ignoriert):', error);
            // Weiter machen – User will unsubscriben, egal ob DB klappt
        }

        // Dann beim Push-Service unsubscriben
        await pushSub.unsubscribe();
        showFeedback('Erinnerung deaktiviert');
    }

    async function updateTime(newTime) {
        const sub = await getCurrentSubscription();
        if (!sub) {
            // Nicht subscribed → nur lokal merken
            localStorage.setItem('reminderTime', newTime);
            return;
        }

        const { hour, minute } = parseTime(newTime);
        const { error } = await db
            .from('subscriptions')
            .update({
                reminder_hour: hour,
                reminder_minute: minute,
                last_sent_at: null
            })
            .eq('endpoint', sub.endpoint);

        if (error) {
            console.error('Update-Fehler:', error);
            showFeedback('Zeit nicht gespeichert: ' + error.message, true);
            return;
        }

        localStorage.setItem('reminderTime', newTime);
        showFeedback('✓ Zeit aktualisiert');
    }

    reminderBtn.addEventListener('click', async () => {
        reminderBtn.disabled = true;
        try {
            const sub = await getCurrentSubscription();
            if (sub) await unsubscribe();
            else     await subscribe();
        } catch (err) {
            console.error(err);
            showFeedback('Fehler: ' + err.message, true);
        }
        reminderBtn.disabled = false;
        updateReminderUI();
    });

    reminderTime.addEventListener('change', async () => {
        await updateTime(reminderTime.value);
        updateReminderUI();
    });

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.ready.then(updateReminderUI);
    } else {
        updateReminderUI();
    }

    /* ================================================
       SERVICE WORKER REGISTRIEREN
       ================================================ */
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('service-worker.js')
                .then(reg => console.log('Service Worker registriert', reg.scope))
                .catch(err => console.log('Service Worker Fehler', err));
        });
    }
    </script>
</body>
</html>

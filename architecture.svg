<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580" font-family="Georgia, 'Times New Roman', serif">
    <!-- Hintergrund -->
    <rect width="900" height="580" fill="#0a0e1f"/>

    <!-- Sterne -->
    <g fill="#e8dcc4" opacity="0.4">
        <circle cx="80" cy="40" r="1"/>
        <circle cx="250" cy="80" r="1"/>
        <circle cx="450" cy="30" r="1"/>
        <circle cx="700" cy="70" r="1"/>
        <circle cx="850" cy="50" r="1"/>
        <circle cx="120" cy="540" r="1"/>
        <circle cx="380" cy="555" r="1"/>
        <circle cx="620" cy="520" r="1"/>
        <circle cx="820" cy="540" r="1"/>
    </g>

    <!-- Titel -->
    <text x="450" y="38" text-anchor="middle" fill="#e8dcc4" font-size="20" font-style="italic">Abendruhe – Systemarchitektur</text>

    <!-- ==== Phone (links) ==== -->
    <g>
        <rect x="50" y="180" width="160" height="240" rx="22" fill="#1a1c3a" stroke="#d4a574" stroke-width="1.5"/>
        <rect x="60" y="200" width="140" height="200" rx="8" fill="#0a0e1f"/>
        <circle cx="130" cy="290" r="30" fill="url(#moonGrad)" opacity="0.9"/>
        <text x="130" y="360" text-anchor="middle" fill="#e8dcc4" font-size="12" font-style="italic">Atme ein</text>
        <text x="130" y="445" text-anchor="middle" fill="#e8dcc4" font-size="14" font-weight="bold">Smartphone</text>
        <text x="130" y="463" text-anchor="middle" fill="#8a8299" font-size="11">PWA installiert</text>
    </g>

    <!-- ==== GitHub Pages (oben mitte) ==== -->
    <g>
        <rect x="295" y="80" width="220" height="80" rx="12" fill="#1a1c3a" stroke="#8a8299" stroke-width="1"/>
        <text x="405" y="115" text-anchor="middle" fill="#e8dcc4" font-size="15" font-weight="bold">GitHub Pages</text>
        <text x="405" y="135" text-anchor="middle" fill="#8a8299" font-size="11">statisches Hosting</text>
        <text x="405" y="150" text-anchor="middle" fill="#8a8299" font-size="11">HTML · CSS · JS · Audio</text>
    </g>

    <!-- ==== Supabase Block (rechte Mitte) ==== -->
    <g>
        <rect x="350" y="200" width="500" height="280" rx="14" fill="none" stroke="#d4a574" stroke-width="1" stroke-dasharray="4 4" opacity="0.7"/>
        <text x="370" y="225" fill="#d4a574" font-size="13" font-style="italic">Supabase (EU, Frankfurt)</text>

        <!-- Database -->
        <rect x="380" y="245" width="190" height="90" rx="10" fill="#1a1c3a" stroke="#e8c896" stroke-width="1.2"/>
        <text x="475" y="272" text-anchor="middle" fill="#e8dcc4" font-size="14" font-weight="bold">Postgres DB</text>
        <text x="475" y="293" text-anchor="middle" fill="#8a8299" font-size="11">Tabelle: subscriptions</text>
        <text x="475" y="310" text-anchor="middle" fill="#8a8299" font-size="11">endpoint · zeit · timezone</text>
        <text x="475" y="325" text-anchor="middle" fill="#8a8299" font-size="11">last_sent_at</text>

        <!-- Edge Function -->
        <rect x="615" y="245" width="200" height="90" rx="10" fill="#1a1c3a" stroke="#e8c896" stroke-width="1.2"/>
        <text x="715" y="272" text-anchor="middle" fill="#e8dcc4" font-size="14" font-weight="bold">Edge Function</text>
        <text x="715" y="293" text-anchor="middle" fill="#8a8299" font-size="11">send-notifications</text>
        <text x="715" y="310" text-anchor="middle" fill="#8a8299" font-size="11">Deno · web-push</text>
        <text x="715" y="325" text-anchor="middle" fill="#8a8299" font-size="11">prüft Zeit, sendet Push</text>

        <!-- pg_cron -->
        <rect x="495" y="370" width="210" height="80" rx="10" fill="#1a1c3a" stroke="#e8c896" stroke-width="1.2"/>
        <text x="600" y="397" text-anchor="middle" fill="#e8dcc4" font-size="14" font-weight="bold">pg_cron</text>
        <text x="600" y="418" text-anchor="middle" fill="#8a8299" font-size="11">Scheduler in Postgres</text>
        <text x="600" y="434" text-anchor="middle" fill="#8a8299" font-size="11">Trigger jede Minute</text>
    </g>

    <!-- ==== Push Service (rechts oben) ==== -->
    <g>
        <rect x="675" y="80" width="170" height="80" rx="12" fill="#1a1c3a" stroke="#8a8299" stroke-width="1"/>
        <text x="760" y="115" text-anchor="middle" fill="#e8dcc4" font-size="14" font-weight="bold">Push-Service</text>
        <text x="760" y="135" text-anchor="middle" fill="#8a8299" font-size="11">Apple bzw. Google</text>
        <text x="760" y="150" text-anchor="middle" fill="#8a8299" font-size="11">Web Push Standard</text>
    </g>

    <!-- ==== PFEILE & LABELS ==== -->
    <defs>
        <marker id="arr" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
            <path d="M0,0 L10,5 L0,10 Z" fill="#d4a574"/>
        </marker>
        <radialGradient id="moonGrad" cx="0.5" cy="0.5" r="0.5">
            <stop offset="0%" stop-color="#e8c896"/>
            <stop offset="60%" stop-color="#d4a574"/>
            <stop offset="100%" stop-color="#d4a574" stop-opacity="0"/>
        </radialGradient>
    </defs>

    <!-- 1) Phone lädt App von GitHub Pages -->
    <path d="M 210 230 Q 260 200 295 130" fill="none" stroke="#d4a574" stroke-width="1.5" marker-end="url(#arr)" opacity="0.8"/>
    <text x="240" y="180" fill="#e8dcc4" font-size="11" font-style="italic">1. lädt App</text>

    <!-- 2) Phone schreibt in DB beim Subscriben -->
    <path d="M 210 290 Q 290 280 380 290" fill="none" stroke="#d4a574" stroke-width="1.5" marker-end="url(#arr)" opacity="0.8"/>
    <text x="245" y="275" fill="#e8dcc4" font-size="11" font-style="italic">2. Subscribe (Zeit, Endpoint)</text>

    <!-- 3) pg_cron triggert Edge Function -->
    <path d="M 660 380 Q 720 365 720 335" fill="none" stroke="#d4a574" stroke-width="1.5" marker-end="url(#arr)" opacity="0.8"/>
    <text x="720" y="380" fill="#e8dcc4" font-size="11" font-style="italic">3. ruft auf</text>

    <!-- 4) Edge Function liest DB -->
    <path d="M 615 295 L 575 295" fill="none" stroke="#d4a574" stroke-width="1.5" marker-end="url(#arr)" opacity="0.8"/>
    <text x="555" y="285" fill="#e8dcc4" font-size="11" font-style="italic">liest</text>

    <!-- 5) Edge Function sendet an Push Service -->
    <path d="M 740 245 Q 760 200 760 165" fill="none" stroke="#d4a574" stroke-width="1.5" marker-end="url(#arr)" opacity="0.8"/>
    <text x="770" y="220" fill="#e8dcc4" font-size="11" font-style="italic">4. sendet</text>

    <!-- 6) Push Service zustellt an Phone -->
    <path d="M 685 130 Q 480 60 130 175" fill="none" stroke="#d4a574" stroke-width="1.5" marker-end="url(#arr)" opacity="0.8"/>
    <text x="400" y="58" text-anchor="middle" fill="#e8dcc4" font-size="11" font-style="italic">5. Notification erscheint auf dem Gerät</text>

    <!-- Legende unten -->
    <g>
        <text x="450" y="510" text-anchor="middle" fill="#8a8299" font-size="11">
            <tspan font-weight="bold" fill="#e8dcc4">Setup-Phase:</tspan>
            <tspan>Schritte 1-2 (User installiert, abonniert)</tspan>
        </text>
        <text x="450" y="528" text-anchor="middle" fill="#8a8299" font-size="11">
            <tspan font-weight="bold" fill="#e8dcc4">Tägliche Erinnerung:</tspan>
            <tspan>Schritte 3-5 (automatisch, jede Minute Trigger)</tspan>
        </text>
        <text x="450" y="555" text-anchor="middle" fill="#d4a574" font-size="11" font-style="italic">100% open source · 0 € Hosting · Multi-Timezone</text>
    </g>
</svg>
